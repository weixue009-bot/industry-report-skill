<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{INDUSTRY}} 产业研究报告</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6f8;color:#1a1a2e;line-height:1.7}
.container{max-width:1200px;margin:0 auto;padding:24px}

/* Header */
.report-header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:40px 48px;border-radius:16px;margin-bottom:24px}
.report-header h1{font-size:28px;font-weight:700;margin-bottom:8px}
.report-header .meta{font-size:14px;color:#8892b0;display:flex;gap:24px;flex-wrap:wrap}

/* Tabs */
.tabs{display:flex;gap:4px;background:#fff;border-radius:12px;padding:6px;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow-x:auto;flex-wrap:wrap}
.tab-btn{padding:10px 20px;border:none;background:transparent;border-radius:8px;font-size:14px;cursor:pointer;color:#666;white-space:nowrap;transition:all .2s}
.tab-btn:hover{background:#f0f1f5;color:#1a1a2e}
.tab-btn.active{background:#0f3460;color:#fff;font-weight:600}

/* Cards */
.card{background:#fff;border-radius:12px;padding:28px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #e8ecf1}
.card h3{font-size:16px;font-weight:600;color:#333;margin:20px 0 12px}
.card p,.card li{font-size:14px;color:#444;line-height:1.8}
.card ul{padding-left:20px;margin:8px 0}

/* Supply Chain */
.supply-chain{display:flex;flex-direction:column;gap:0;width:100%;max-width:100%}
.sc-layer{display:flex;align-items:stretch;gap:14px;padding:14px 16px;border-radius:10px;width:100%;box-sizing:border-box}
.sc-layer-demand{background:linear-gradient(135deg,#e8ecf1 0%,#d5dae3 100%);border-left:4px solid #2c3e50}
.sc-layer-core{background:linear-gradient(135deg,#fef5e7 0%,#fdebd0 100%);border-left:4px solid #e67e22}
.sc-layer-upstream{background:linear-gradient(135deg,#eaecee 0%,#d5dbdb 100%);border-left:4px solid #7f8c8d}
.sc-layer-label{flex-shrink:0;width:88px;font-size:14px;font-weight:700;color:#1a1a2e;display:flex;align-items:center;justify-content:center;padding:10px 12px;background:rgba(255,255,255,.85);border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.sc-layer-content{display:grid;gap:10px;flex:1;align-items:stretch;min-width:0}
.sc-grid-1{grid-template-columns:1fr}
.sc-grid-2{grid-template-columns:repeat(2,1fr)}
.sc-grid-3{grid-template-columns:repeat(3,1fr)}
.sc-grid-4{grid-template-columns:repeat(4,1fr)}
.sc-grid-5{grid-template-columns:repeat(5,1fr)}
.sc-grid-6{grid-template-columns:repeat(6,1fr)}
.sc-box{color:#fff;padding:12px 14px;border-radius:8px;font-size:13px;font-weight:500;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;line-height:1.45;box-shadow:0 1px 3px rgba(0,0,0,.12);min-height:64px;word-break:break-word;hyphens:auto}
.sc-box-title{font-size:14px;font-weight:700;margin-bottom:4px;opacity:.95}
.sc-box-desc{font-size:12px;opacity:.85;font-weight:400;line-height:1.5}
.sc-box-ratio{margin-top:8px;background:rgba(255,255,255,.92);color:#1a1a2e;font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;line-height:1.2;box-shadow:0 1px 3px rgba(0,0,0,.12);letter-spacing:.5px}
.sc-arrow{display:flex;justify-content:center;align-items:center;padding:0;margin:0;height:28px}
.sc-arrow svg{height:28px;max-width:60px}

/* Score Grid */
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.score-item{text-align:center;padding:16px;background:#f8f9fc;border-radius:10px}
.two-col .score-grid{grid-template-columns:1fr;gap:10px}
.two-col .score-item{display:flex;align-items:center;gap:12px;text-align:left;padding:10px 14px}
.two-col .score-item .score-label{width:88px;flex-shrink:0;margin-bottom:0;font-size:13px;font-weight:600;color:#1a1a2e}
.two-col .score-item .score-value{font-size:20px;width:36px;flex-shrink:0;text-align:right}
.two-col .score-item .score-bar{flex:1;min-width:80px;margin:0}
.two-col .score-item .score-note{font-size:12px;color:#777;flex:1;min-width:140px;line-height:1.5}
.score-label{font-size:13px;color:#666;margin-bottom:6px}
.score-bar{width:100%;height:8px;background:#e8ecf1;border-radius:4px;overflow:hidden;margin:8px 0}
.score-fill{height:100%;border-radius:4px;transition:width .4s ease}
.score-fill.high{background:#e74c3c}
.score-fill.mid{background:#f39c12}
.score-fill.low{background:#27ae60}
.score-value{font-size:24px;font-weight:700}
.score-value.high{color:#e74c3c}
.score-value.mid{color:#f39c12}
.score-value.low{color:#27ae60}

/* Cost Breakdown */
.cost-bars{display:flex;flex-direction:column;gap:14px}
.cost-row{display:grid;grid-template-columns:120px 1fr 320px;align-items:center;gap:16px;padding:12px 14px;background:#f8f9fc;border-radius:8px}
.cost-label{font-size:14px;text-align:right;color:#1a1a2e;font-weight:600}
.cost-track{height:32px;background:#e8ecf1;border-radius:6px;overflow:hidden;position:relative;min-width:200px}
.cost-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 14px;font-size:13px;color:#fff;font-weight:600;min-width:48px;box-shadow:inset 0 1px 2px rgba(0,0,0,.1)}
.cost-note{font-size:13px;color:#555;line-height:1.6;text-align:left;padding-left:12px;border-left:2px solid #d5dae3}

/* Timeline */
.timeline{position:relative;padding-left:32px}
.timeline::before{content:"";position:absolute;left:15px;top:4px;bottom:4px;width:2px;background:#e0e4ea}
.timeline-item{position:relative;margin-bottom:20px;padding-left:8px}
.timeline-item::before{content:"";position:absolute;left:-21px;top:6px;width:10px;height:10px;border-radius:50%;background:#0f3460;border:2px solid #fff;box-shadow:0 0 0 2px #0f3460}
.timeline-year{font-size:16px;font-weight:700;color:#0f3460}
.timeline-event{font-size:14px;color:#444;margin-top:4px}

/* Stock table */
.stock-table{width:100%;border-collapse:collapse;font-size:14px;table-layout:auto}
.stock-table th{background:#f8f9fc;padding:12px 14px;text-align:left;font-weight:600;color:#333;border-bottom:2px solid #e0e4ea;position:sticky;top:0;white-space:nowrap}
.stock-table td{padding:12px 14px;border-bottom:1px solid #f0f1f5;color:#444;word-break:break-word}
.stock-table tr:last-child td{border-bottom:none}
.stock-table .score-cell{font-weight:700}
.stock-table .score-cell.high{color:#e74c3c}
.stock-table .score-cell.mid{color:#f39c12}
.stock-table .score-cell.low{color:#27ae60}
.stock-table th.col-name, .stock-table td.col-name{min-width:96px}
.stock-table th.col-code, .stock-table td.col-code{min-width:96px;color:#999}
.stock-table th.col-role, .stock-table td.col-role{min-width:84px;width:84px;white-space:nowrap;text-align:center}
.stock-table .col-role .tag{white-space:nowrap;display:inline-block;padding:4px 10px;font-size:12px}
.stock-table th.col-irr, .stock-table td.col-irr{min-width:84px}
.stock-table th.col-score, .stock-table td.col-score{min-width:72px;text-align:center}
.stock-table th.col-eps, .stock-table td.col-eps{min-width:110px;text-align:center;font-size:13px}
.eps-line{color:#444;font-size:13px;white-space:nowrap}
.eps-growth{font-weight:700;font-size:12px;white-space:nowrap}
.stock-table th.col-dim, .stock-table td.col-dim{min-width:64px;text-align:center}
.stock-table th.col-note, .stock-table td.col-note{min-width:200px;line-height:1.6}
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600}
.badge.tech{background:#eef2ff;color:#4f46e5}
.badge.capacity{background:#fef3c7;color:#d97706}
.badge.both{background:#fce7f3;color:#db2777}

/* Dimension bars */
.dim-bars{display:grid;gap:14px}
.dim-row{display:flex;align-items:center;gap:12px}
.dim-label{width:100px;font-size:14px;text-align:right;flex-shrink:0;color:#444}
.dim-track{flex:1;height:20px;background:#e8ecf1;border-radius:10px;overflow:hidden}
.dim-fill{height:100%;border-radius:10px;transition:width .4s ease}
.dim-score{width:40px;font-size:14px;font-weight:600;text-align:left;flex-shrink:0;color:#444}
.dim-score.high{color:#e74c3c}
.dim-score.mid{color:#f39c12}
.dim-score.low{color:#27ae60}

/* Grid layouts */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:stretch}
@media(max-width:768px){.two-col{grid-template-columns:1fr}}
.two-col .card{height:100%;display:flex;flex-direction:column}

/* Footer */
.report-footer{text-align:center;padding:32px;color:#999;font-size:12px;border-top:1px solid #e8ecf1;margin-top:32px}

/* Toggle sections */
.toggle-section{margin-bottom:12px}
.toggle-header{cursor:pointer;padding:14px 16px;background:#f8f9fc;border-radius:8px;font-weight:600;font-size:15px;display:flex;justify-content:space-between;align-items:center;user-select:none;color:#333}
.toggle-header::after{content:"+";font-size:18px;color:#999}
.toggle-section.open .toggle-header::after{content:"-"}
.toggle-body{display:none;padding:16px 0}
.toggle-section.open .toggle-body{display:block}

/* Section titles */
.section-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::before{content:"";width:4px;height:18px;background:#0f3460;border-radius:2px}

.tag{display:inline-flex;align-items:center;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;margin-right:8px}
.tag.irreplaceable{background:#fee2e2;color:#dc2626}
.tag.medium{background:#fef3c7;color:#d97706}
.tag.low-replace{background:#dcfce7;color:#16a34a}

/* Segment page layouts */
.segment-top{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:16px}
.segment-top .pos-card{grid-row:1 / span 2;display:flex;flex-direction:column;justify-content:center}
.segment-top .metric-card{display:flex;flex-direction:column;justify-content:center;min-height:100px}
.segment-top .metric-value{font-size:32px;font-weight:700;color:#e74c3c;margin-bottom:6px}
.segment-top .metric-label{font-size:13px;color:#666;font-weight:600}
.segment-top .metric-desc{font-size:13px;color:#888;margin-top:6px;line-height:1.5}

.landscape-card{background:#fff;display:flex;flex-direction:column;position:relative}
.landscape-rows{display:flex;flex-direction:column;gap:0;border:1px solid #e8ecf1;border-radius:8px;overflow:hidden;flex:1;height:100%}
.landscape-rows{display:grid;grid-template-rows:repeat(4,1fr)}
.landscape-row{display:flex;align-items:stretch;border-bottom:1px solid #eef2f7}
.landscape-row:last-child{border-bottom:none}
.landscape-key{width:110px;flex-shrink:0;background:#f8f9fc;padding:14px;font-size:13px;font-weight:600;color:#555;display:flex;align-items:center;border-right:1px solid #eef2f7}
.landscape-val{flex:1;padding:14px;font-size:13px;color:#444;line-height:1.7;display:flex;align-items:center}

.evidence-card{background:#fff}
.evidence-list{display:flex;flex-direction:column;gap:10px}
.evidence-item{padding:12px 14px;background:#f8f9fc;border-radius:8px;border-left:3px solid #0f3460}
.evidence-title{font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:4px}
.evidence-meta{font-size:12px;color:#888}

/* Stock card */
.stock-card{background:#fff;border:1px solid #e8ecf1;border-radius:10px;padding:16px;transition:box-shadow .2s}
.stock-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.stock-card .stock-name{font-size:16px;font-weight:700;margin-bottom:4px}
.stock-card .stock-code{font-size:12px;color:#999}
.stock-card .stock-logic{font-size:13px;color:#666;margin-top:8px;line-height:1.6}
.stock-card .stock-segment{font-size:12px;color:#0f3460;margin-top:4px}

/* Concept clarification table */ 
.concept-table{width:100%;border-collapse:collapse;margin:0}
.concept-table th{background:#f8f9fc;padding:12px 14px;text-align:left;font-weight:600;color:#333;border-bottom:2px solid #e0e4ea;font-size:15px}
.concept-table td{padding:10px 14px;border-bottom:1px solid #f0f1f5;color:#444;font-size:14px;line-height:1.7}
.concept-table tr:last-child td{border-bottom:none}
.concept-table td:first-child{font-weight:700;white-space:nowrap;width:160px}
.concept-table ul{margin:0;padding-left:16px}
.concept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:8px}
.concept-card{background:linear-gradient(135deg,#f8f9fc 0%,#eef2f7 100%);border-left:3px solid #0f3460;border-radius:6px;padding:14px 18px;transition:all .2s}
.concept-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(15,52,96,.12)}
.concept-title{font-size:15px;font-weight:700;color:#0f3460;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #dde3ec}
.concept-points{margin:0;padding-left:18px}
.concept-points li{font-size:13px;color:#555;line-height:1.7;margin-bottom:6px}
.concept-points li::marker{color:#0f3460}
.pool-table{width:100%;border-collapse:collapse;margin-top:4px;font-size:13px;table-layout:fixed;word-break:break-word}
.pool-table th{background:#f8f9fc;padding:10px 12px;text-align:left;font-weight:600;color:#333;border-bottom:2px solid #e0e4ea;font-size:13px;white-space:nowrap}
.pool-table th.col-name{width:25%;min-width:120px}
.pool-table th.col-seg{width:18%;min-width:90px}
.pool-table th.col-logic{width:auto}
.pool-table td{padding:12px;border-bottom:1px solid #f0f1f5;color:#444;line-height:1.6;vertical-align:middle}
.pool-table td.col-seg{white-space:nowrap;font-size:13px;color:#666}
.pool-table td.col-logic{white-space:normal;word-break:break-word;overflow-wrap:break-word;line-height:1.55}
.pool-table tr:last-child td{border-bottom:none}
.pool-table td.col-name{white-space:nowrap}
.pool-stock{font-weight:700;color:#1a1a2e;margin-right:6px}
.pool-code{color:#999;font-size:12px;font-family:'SF Mono','Consolas',monospace}

/* Profit logic cards */
.profit-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.profit-card{background:linear-gradient(135deg,#f8f9fc 0%,#eef2ff 100%);border:1px solid #dde2f0;border-radius:10px;padding:16px;text-align:center;font-size:14px;font-weight:600;color:#333;line-height:1.5}

/* Key Constraints - numbered */
.constraint-item{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}
.constraint-num{flex-shrink:0;width:28px;height:28px;background:#e74c3c;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.constraint-label{font-weight:700;font-size:14px;color:#333;margin-bottom:4px}
.constraint-detail{font-size:13px;color:#555;line-height:1.6}

/* Research path */
.research-path{background:linear-gradient(135deg,#f8f9fc 0%,#eef2ff 100%);border:2px dashed #b8c5e0;border-radius:10px;padding:20px 24px;margin-bottom:20px;text-align:center}
.research-path .path-label{font-size:12px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.research-path .path-text{font-size:15px;color:#333;line-height:1.7;font-weight:500}

/* Proposition card */
.proposition-box{background:linear-gradient(135deg,#fef9f3 0%,#fdf2e0 100%);border-left:4px solid #e67e22;padding:18px 24px;margin-bottom:20px;border-radius:0 10px 10px 0}
.proposition-box .prop-label{font-size:12px;color:#999;margin-bottom:4px}
.proposition-box .prop-text{font-size:15px;color:#333;line-height:1.8;font-weight:500}

/* Summary box */
.summary-box{background:linear-gradient(135deg,#eef2ff 0%,#e0e7ff 100%);border:1px solid #c7d2fe;border-radius:10px;padding:20px;margin-bottom:20px}
</style>
</head>
<body>
<div class="container">

<!-- Header -->
<div class="report-header">
  <h1>{{INDUSTRY}} 产业研究报告</h1>
  <div class="meta">
    <span>{{DATA_SOURCE}}</span>
    <span>生成时间：{{GEN_TIME}}</span>
    <span>覆盖研报：{{REPORT_COUNT}} 篇</span>
    <span>时间范围：{{TIME_RANGE}}</span>
  </div>
</div>

<!-- Tab Navigation -->
<nav class="tabs" id="tab-nav"></nav>

<!-- Content Area -->
<main id="content"></main>

<!-- Footer -->
<div class="report-footer">
  {{DATA_SOURCE}} · 研报内容来自各券商研究所 · 仅供参考，不构成投资建议<br>
  生成工具：WorkBuddy Industry Report Skill · {{GEN_TIME}}
</div>

</div>

<!-- Data -->
<script id="report-data" type="application/json">{{DATA_JSON}}</script>

<script>
const DATA = JSON.parse(document.getElementById('report-data').textContent);
const industry = DATA.industry;
const segments = DATA.segments || [];
const overview = DATA.overview || {};

// Color helpers - unified single accent
function scoreColor(v) {
  if (v >= 80) return 'high';
  if (v >= 60) return 'mid';
  return 'low';
}

// Build tabs
function buildTabs() {
  const nav = document.getElementById('tab-nav');
  let html = `<button class="tab-btn active" onclick="showTab('overview', this)">总览</button>`;
  for (const seg of segments) {
    html += `<button class="tab-btn" onclick="showTab('${escapeHtml(seg.name)}', this)">${escapeHtml(seg.name)}</button>`;
  }
  nav.innerHTML = html;
}

function showTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContent(name);
}

function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Render content based on selected tab
function renderContent(tabName) {
  const el = document.getElementById('content');
  if (tabName === 'overview') {
    el.innerHTML = renderOverview();
  } else {
    const seg = segments.find(s => s.name === tabName);
    if (seg) el.innerHTML = renderSegment(seg);
    else el.innerHTML = '<div class="card"><p>数据加载失败</p></div>';
  }
  // Re-init toggles
  document.querySelectorAll('.toggle-header').forEach(h => {
    h.addEventListener('click', function() {
      this.parentElement.classList.toggle('open');
    });
  });
}

// ------ Overview Page ------
function renderOverview() {
  const o = overview;
  let html = '';

  // 1. Judgment - one-sentence core insight
  if (o.judgment) {
    html += `<div class="card" style="border-left:4px solid #0f3460;background:#f0f4ff">
      <h2 style="border:none;margin-bottom:8px;padding-bottom:0;font-size:18px">${escapeHtml(o.judgment)}</h2>
    </div>`;
  }

  // 2. Proposition - "不是X，而是Y"
  if (o.proposition) {
    html += `<div class="proposition-box">
      <div class="prop-label">核心命题</div>
      <div class="prop-text">${escapeHtml(o.proposition)}</div>
    </div>`;
  }

  // 3. Definition
  if (o.definition) {
    html += `<div class="card" style="border-left:3px solid #a69580;background:#fafbfc;padding:18px 24px">
      <p style="font-size:14px;line-height:1.8;color:#555">${escapeHtml(o.definition)}</p>
    </div>`;
  }

  // 4. Concept clarification - "先分清N件事" — 改为卡片网格，每维度独立卡片
  const cc = o.concept_clarification || [];
  if (cc.length) {
    html += '<div class="card"><h2>先分清' + (cc.length>3?cc.length:'三') + '件事</h2><div class="concept-grid">';
    for (const c of cc) {
      html += `<div class="concept-card">
        <div class="concept-title">${escapeHtml(c.dimension)}</div>
        <ul class="concept-points">`;
      for (const p of (c.points||[])) { html += `<li>${escapeHtml(p)}</li>`; }
      html += `</ul></div>`;
    }
    html += '</div></div>';
  }

  // 5. Supply chain diagram
  html += '<div class="card"><h2>产业链结构</h2>';
  html += renderSupplyChain(o.supply_chain);
  html += '</div>';

  // 6+7. Sector scores + Core stock pool - side by side
  const hasScores = o.sector_scores && o.sector_scores.dimensions;
  const poolData2 = o.core_stock_pool || {};
  const groups2 = poolData2.groups || [];
  const hasPool = groups2.length > 0;

  if (hasScores || hasPool) {
    const useTwoCol = hasScores && hasPool;
    html += useTwoCol ? '<div class="two-col">' : '';

    // 6. Sector scores
    if (hasScores) {
      html += '<div class="card"><h2>板块评分总览</h2><div class="score-grid">';
      for (const d of o.sector_scores.dimensions) {
        html += `<div class="score-item">
          <div class="score-label">${escapeHtml(d.name)}</div>
          <div class="score-value ${scoreColor(d.score)}">${d.score}</div>
          <div class="score-bar"><div class="score-fill ${scoreColor(d.score)}" style="width:${d.score}%"></div></div>
          <div class="score-note">${escapeHtml(d.note||'')}</div>
        </div>`;
      }
      html += '</div></div>';
    }

    // 7. Core stock pool - table-style grouped
    if (hasPool) {
      html += '<div class="card"><h2>核心标的池</h2>';
      for (const g of groups2) {
        html += `<div style="margin-bottom:20px">
          <div style="margin-bottom:8px"><span style="font-size:14px;font-weight:700;color:#0f3460">${escapeHtml(g.category)}</span> <span style="color:#888;font-size:12px">${escapeHtml(g.role_desc||'')}</span></div>
          <table class="pool-table">
            <thead><tr><th class="col-name">名称/代码</th><th class="col-seg">细分环节</th><th class="col-logic">入选逻辑</th></tr></thead><tbody>`;
        for (const s of (g.stocks||[])) {
          html += `<tr>
            <td class="col-name"><span class="pool-stock">${escapeHtml(s.name)}</span><span class="pool-code">${escapeHtml(s.code||'')}</span></td>
            <td class="col-seg">${escapeHtml(s.segment||'')}</td>
            <td class="col-logic">${escapeHtml(s.logic||'')}</td>
          </tr>`;
        }
        html += '</tbody></table></div>';
      }
      html += '</div>';
    }

    html += useTwoCol ? '</div>' : '';
  }

  // 8. Cost breakdown
  if (o.cost_breakdown && o.cost_breakdown.length) {
    const colors = ['#0f3460','#1a5276','#2980b9','#3498db','#5dade2','#85c1e9',
                    '#2e4053','#5d6d7e','#85929e'];
    html += `<div class="card"><h2>${escapeHtml(industry)}价值量构成</h2><div class="cost-bars">`;
    for (let i = 0; i < o.cost_breakdown.length; i++) {
      const c = o.cost_breakdown[i];
      html += `<div class="cost-row">
        <div class="cost-label">${escapeHtml(c.component)}</div>
        <div class="cost-track">
          <div class="cost-fill" style="width:${c.ratio}%;background:${colors[i%colors.length]}">${c.ratio}%</div>
        </div>
        <div class="cost-note">${escapeHtml(c.note||'')}</div>
      </div>`;
    }
    html += '</div></div>';
  }

  // 9. Profit logic - 3 verb-driven sentences
  const pl = o.profit_logic || [];
  if (pl.length) {
    html += '<div class="card"><h2>盈利逻辑</h2><div class="profit-cards">';
    for (const p of pl) {
      html += `<div class="profit-card">${escapeHtml(p)}</div>`;
    }
    html += '</div></div>';
  }

  // 10. Key constraints - numbered
  const kc = o.key_constraints || [];
  if (kc.length) {
    html += '<div class="card"><h2>关键约束 / 稀缺层</h2>';
    for (const k of kc) {
      const kid = k.id || k.letter || '';
      html += `<div class="constraint-item">
        <div class="constraint-num">${kid}</div>
        <div>
          <div class="constraint-label">${escapeHtml(k.label||k)}</div>
          <div class="constraint-detail">${escapeHtml(k.detail||'')}</div>
        </div>
      </div>`;
    }
    html += '</div>';
  }

  // 11. Production timeline
  if (o.production_timeline && o.production_timeline.length) {
    html += '<div class="card"><h2>量产进度 / 产业兑现进度</h2><div class="timeline">';
    for (const t of o.production_timeline) {
      html += `<div class="timeline-item">
        <div class="timeline-year">${escapeHtml(t.year)}</div>
        <div class="timeline-event">${escapeHtml(t.event)}</div>
      </div>`;
    }
    html += '</div></div>';
  }

  // 12. Segment priority
  if (o.segment_priority && o.segment_priority.length) {
    html += '<div class="card"><h2>环节研究优先级</h2><div style="overflow-x:auto"><table class="stock-table"><thead><tr><th style="width:60px">#</th><th>环节</th><th>优先级原因</th></tr></thead><tbody>';
    for (const p of o.segment_priority) {
      html += `<tr><td style="font-weight:700;color:#0f3460">${p.rank}</td><td><strong>${escapeHtml(p.segment)}</strong></td><td style="font-size:13px;color:#555">${escapeHtml(p.reason)}</td></tr>`;
    }
    html += '</tbody></table></div></div>';
  }

  // 13. Watch metrics - A/B/C/D lettered
  const wm = o.watch_metrics || [];
  if (wm.length) {
    html += '<div class="card"><h2>重点跟踪指标</h2><div style="overflow-x:auto"><table class="stock-table"><thead><tr><th style="width:50px">#</th><th>指标</th><th>为什么关注</th></tr></thead><tbody>';
    for (const w of wm) {
      const wl = w.letter || '';
      html += `<tr><td style="font-weight:700;color:#0f3460">${wl}</td><td><strong>${escapeHtml(w.metric)}</strong></td><td style="font-size:13px;color:#555">${escapeHtml(w.why)}</td></tr>`;
    }
    html += '</tbody></table></div></div>';
  }

  // 14. Next steps
  const ns = o.next_steps || [];
  if (ns.length) {
    const nsList = ns.map(n => `<li>${escapeHtml(n)}</li>`).join('');
    html += `<div class="card" style="border-left:4px solid #8b7355;background:#faf7f0">
      <h2>下一步核验</h2>
      <ul style="font-size:14px;line-height:1.8;padding-left:20px;color:#555">${nsList}</ul>
    </div>`;
  }

  // 15. Market blind spots
  if (o.market_blind_spots) {
    html += `      <div class="card" style="border-left:4px solid #e67e22;background:#fef9f3">
      <h2>市场可能忽略的地方</h2>
      <p style="font-size:14px;line-height:1.8;white-space:pre-wrap;color:#333">${escapeHtml(o.market_blind_spots)}</p>
    </div>`;
  }

  // 16. Research path - one-line guidance
  if (o.research_path) {
    html += `<div class="research-path">
      <div class="path-label">一句话研究路径</div>
      <div class="path-text">${escapeHtml(o.research_path)}</div>
    </div>`;
  }

  // 17. Conclusion
  if (o.conclusion) {
    let conclusionHtml = escapeHtml(o.conclusion);
    conclusionHtml = conclusionHtml.replace(/来源等级[：:][^\n]*/g,
      '<span style="display:block;margin-top:12px;padding:8px 12px;background:#f0ede6;border-radius:6px;font-size:12px;color:#555">$&</span>');
    html += `<div class="summary-box">
      <div class="section-title">板块结论与投资建议</div>
      <div style="font-size:14px;line-height:1.8;white-space:pre-wrap">${conclusionHtml}</div>
    </div>`;
  }

  return html;
}

// ------ Supply Chain (HTML, not SVG) ------
function renderSupplyChain(sc) {
  if (!sc) return '<p style="color:#999">产业链信息待补充</p>';

  const demand = sc.demand || [];
  const core = sc.core_segments || [];
  const upstream = sc.upstream || [];

  // 按 segment.name 从 segments 数组查 value_ratio，用于在核心环节 box 上显示占比
  const segName2Ratio = {};
  for (const s of segments) {
    if (s.name) segName2Ratio[s.name] = s.value_ratio;
  }

  const segNames = segments.map(s => s.name);
  const coreItems = core.length >= segNames.length ? core : segNames;

  // 兼容格式：把 "靶点发现与药物设计" 映射到对应 segment（含在前沿技术中）
  // 让 coreItems 显示时按匹配到的 segment 名称带上 value_ratio
  function lookupRatio(itemTitle) {
    // 直接匹配
    if (segName2Ratio[itemTitle] !== undefined) return segName2Ratio[itemTitle];
    // 模糊匹配：item 包含某个 segment.name，或 segment.name 包含 item
    for (const s of segments) {
      if (!s.name) continue;
      if (itemTitle.indexOf(s.name) >= 0 || s.name.indexOf(itemTitle) >= 0) {
        return s.value_ratio;
      }
    }
    return null;
  }

  // Color palettes - single warm accent
  const demandColors = ['#2c3e50','#34495e','#4a5f7a','#2c3e50','#34495e'];
  const coreColors = ['#e74c3c','#e67e22','#3498db','#1abc9c','#9b59b6','#e91e63','#16a085'];
  const upColors = ['#7f8c8d','#95a5a6','#7f8c8d','#95a5a6','#bdc3c7'];

  // 格式化条目：支持 "标题(说明)" 或 "标题（说明）" 形式，拆为标题+描述
  function formatItem(item) {
    const m = String(item).match(/^([^()（）]+)[(（]([^)）]+)[)）]\s*$/);
    if (m) {
      return { title: m[1].trim(), desc: m[2].trim() };
    }
    return { title: String(item), desc: '' };
  }

  function renderLayer(title, items, colors, layerType) {
    const n = items.length;
    const gridClass = n <= 1 ? 'sc-grid-1' : n <= 2 ? 'sc-grid-2' : n <= 3 ? 'sc-grid-3' : n <= 4 ? 'sc-grid-4' : n <= 5 ? 'sc-grid-5' : 'sc-grid-6';
    const boxes = items.map((item, i) => {
      const color = colors[i % colors.length];
      const f = formatItem(item);
      // 仅在核心环节 layer 上显示价值量占比
      let ratioBadge = '';
      if (layerType === 'core') {
        const ratio = lookupRatio(f.title);
        if (ratio !== null && ratio !== undefined) {
          ratioBadge = `<div class="sc-box-ratio">${ratio}%</div>`;
        }
      }
      const inner = f.desc
        ? `<div class="sc-box-title">${escapeHtml(f.title)}</div><div class="sc-box-desc">${escapeHtml(f.desc)}</div>`
        : `<div class="sc-box-title">${escapeHtml(f.title)}</div>`;
      return `<div class="sc-box" style="background:${color}">${inner}${ratioBadge}</div>`;
    }).join('');
    return `
      <div class="sc-layer sc-layer-${layerType}">
        <div class="sc-layer-label">${title}</div>
        <div class="sc-layer-content ${gridClass}">${boxes}</div>
      </div>`;
  }

  function renderArrow(direction) {
    return `<div class="sc-arrow sc-arrow-${direction}">
      <svg width="100%" height="36" viewBox="0 0 200 36" preserveAspectRatio="xMidYMid meet">
        <defs><marker id="sc-arrow-${direction}" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#0f3460"/></marker></defs>
        <line x1="100" y1="2" x2="100" y2="28" stroke="#0f3460" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#sc-arrow-${direction})"/>
      </svg>
    </div>`;
  }

  return `
    <div class="supply-chain">
      ${renderLayer('需求端', demand, demandColors, 'demand')}
      ${renderArrow('down')}
      ${renderLayer('核心环节', coreItems, coreColors, 'core')}
      ${renderArrow('up')}
      ${renderLayer('上游材料与设备', upstream, upColors, 'upstream')}
    </div>`;
}

// ------ Segment Page ------
function renderSegment(seg) {
  let html = '';

  // 1. Top section: 3 cards (positioning + value ratio + localization)
  const hasRatio = seg.value_ratio !== undefined && seg.value_ratio !== null;
  const hasLocalization = seg.localization_progress;
  html += '<div class="segment-top">';
  html += `<div class="card pos-card">
    <div class="section-title">环节定位</div>
    <div style="font-size:14px;line-height:1.8;white-space:pre-wrap">${escapeHtml(seg.positioning || '待补充')}</div>
  </div>`;
  if (hasRatio) {
    const ratioDescMap = {
      '人形机器人': '占人形机器人BOM成本',
      '工业机器人': '占工业机器人BOM成本',
      '机器人': '占机器人BOM成本',
      '创新药': '占创新药管线总价值',
      '半导体': '占半导体设备总价值',
      '新能源': '占新能源装备总价值',
      'CXO': '占CXO/CDMO总价值',
      '光伏': '占光伏组件总价值',
      '锂电池': '占锂电池总价值',
    };
    const desc = ratioDescMap[industry] || `占${industry}产业总价值`;
    html += `<div class="card metric-card">
      <div class="metric-value">${seg.value_ratio}%</div>
      <div class="metric-label">价值量占比</div>
      <div class="metric-desc">${desc}约${seg.value_ratio}%</div>
    </div>`;
  }
  if (hasLocalization) {
    html += `<div class="card metric-card">
      <div class="section-title" style="margin-bottom:8px;font-size:14px">国产化进展</div>
      <div style="font-size:13px;line-height:1.7;color:#555;white-space:pre-wrap">${escapeHtml(seg.localization_progress)}</div>
    </div>`;
  }
  html += '</div>';

  // 2. Two column: international + domestic landscape
  function renderLandscapeCard(title, landscape) {
    // Support both old string and new structured object
    const isStructured = landscape && typeof landscape === 'object' && !Array.isArray(landscape);
    let rows = '';
    if (isStructured) {
      const keys = ['主导厂商', '份额结构', '技术/工艺代差', '进入壁垒'];
      for (const k of keys) {
        const v = landscape[k] || '待补充';
        rows += `<div class="landscape-row"><div class="landscape-key">${escapeHtml(k)}</div><div class="landscape-val">${escapeHtml(v)}</div></div>`;
      }
    } else {
      // Fallback for legacy string
      rows = `<div class="landscape-row"><div class="landscape-key">概况</div><div class="landscape-val">${escapeHtml(landscape || '待补充')}</div></div>`;
    }
    return `<div class="card landscape-card">
      <div class="section-title">${escapeHtml(title)}</div>
      <div class="landscape-rows">${rows}</div>
    </div>`;
  }

  html += '<div class="two-col">';
  html += renderLandscapeCard('国际竞争格局', seg.international_landscape);
  html += renderLandscapeCard('国内竞争格局', seg.domestic_landscape);
  html += '</div>';

  // Product tiers
  const tiers = seg.product_tiers || [];
  if (tiers.length) {
    html += '<div class="card"><div class="section-title">产品分层</div>';
    html += '<div style="overflow-x:auto"><table class="stock-table"><thead><tr>';
    html += '<th>层级</th><th>价格区间</th><th>典型玩家</th><th>毛利率</th><th>市占率</th></tr></thead><tbody>';
    for (const t of tiers) {
      html += `<tr>
        <td><strong>${escapeHtml(t.tier)}</strong></td>
        <td>${escapeHtml(t.asp||'')}</td>
        <td>${escapeHtml(t.key_players||'')}</td>
        <td>${escapeHtml(t.margin||'')}</td>
        <td>${escapeHtml(t.market_share||'')}</td>
      </tr>`;
    }
    html += '</tbody></table></div></div>';
  }

  // Barrier type
  const bt = seg.barrier_type || '待定';
  let badgeClass = 'tech';
  if (bt.includes('产能')) badgeClass = bt.includes('科技') ? 'both' : 'capacity';
  html += `<div class="card">
    <div class="section-title">壁垒类型 <span class="badge ${badgeClass}">${escapeHtml(bt)}</span></div>
    <div style="font-size:14px;line-height:1.8;white-space:pre-wrap">${escapeHtml(seg.barrier_detail || '待补充')}</div>
  </div>`;

  // Failure conditions
  const failConditions = seg.failure_conditions || [];
  if (failConditions.length) {
    const failList = failConditions.map(fc => `<li>${escapeHtml(fc)}</li>`).join('');
    html += `<div class="card" style="border-left:4px solid #e74c3c;background:#fef5f5">
      <div class="section-title" style="color:#c0392b">失败条件</div>
      <ul style="font-size:14px;line-height:1.8;padding-left:20px">${failList}</ul>
    </div>`;
  }

  // Profit drivers
  const profitDrivers = seg.profit_drivers || [];
  if (profitDrivers.length) {
    html += '<div class="card"><div class="section-title">利润驱动</div><div style="overflow-x:auto"><table class="stock-table"><thead><tr><th>驱动因素</th><th>影响权重</th><th>说明</th></tr></thead><tbody>';
    for (const pd of profitDrivers) {
      const wClass = pd.weight === '高' ? 'irreplaceable' : pd.weight === '中' ? 'medium' : 'low-replace';
      html += `<tr><td><strong>${escapeHtml(pd.driver)}</strong></td><td><span class="tag ${wClass}">${escapeHtml(pd.weight)}</span></td><td style="font-size:13px;color:#555">${escapeHtml(pd.note||'')}</td></tr>`;
    }
    html += '</tbody></table></div></div>';
  }

  // Tech roadmap
  const roadmap = seg.tech_roadmap || [];
  if (roadmap.length) {
    html += '<div class="card"><div class="section-title">技术路线图</div><div style="overflow-x:auto"><table class="stock-table"><thead><tr><th>技术方向</th><th>预计时间</th><th>竞争影响</th></tr></thead><tbody>';
    for (const tr of roadmap) {
      html += `<tr><td><strong>${escapeHtml(tr.direction)}</strong></td><td style="color:#999">${escapeHtml(tr.timeline)}</td><td style="font-size:13px;color:#555">${escapeHtml(tr.impact)}</td></tr>`;
    }
    html += '</tbody></table></div></div>';
  }

  // Scoring dimensions
  const dims = seg.scoring_dimensions || [];
  html += '<div class="card"><div class="section-title">评分维度权重</div><div class="dim-bars">';
  const dimColors = ['#e74c3c','#3498db','#1abc9c','#f39c12','#9b59b6'];
  for (let i = 0; i < dims.length; i++) {
    const d = dims[i];
    const wPct = d.weight === '高' ? 85 : d.weight === '中' ? 55 : d.weight === '中低' ? 35 : 20;
    html += `<div class="dim-row">
      <div class="dim-label">${escapeHtml(d.name)}</div>
      <div class="dim-track"><div class="dim-fill" style="width:${wPct}%;background:${dimColors[i%dimColors.length]}"></div></div>
      <div class="dim-score ${scoreColor(wPct)}">${d.weight}</div>
    </div>`;
  }
  html += '</div></div>';

  // Stock table
  const stocks = seg.stocks || [];
  if (stocks.length) {
    // Check if any stock has EPS forecast data
    const hasEps = stocks.some(s => s.eps_forecast && (s.eps_forecast.this_year || s.eps_forecast.next_year));

    html += '<div class="card"><div class="section-title">核心标的</div>';
    html += '<div style="overflow-x:auto"><table class="stock-table"><colgroup>';
    html += '<col class="col-name"><col class="col-code"><col class="col-role"><col class="col-irr"><col class="col-score">';
    if (hasEps) { html += '<col class="col-eps">'; }
    for (let i = 0; i < dims.length; i++) { html += '<col class="col-dim">'; }
    html += '<col class="col-note"></colgroup><thead><tr>';
    html += '<th class="col-name">公司</th><th class="col-code">代码</th><th class="col-role">角色</th><th class="col-irr">不可替代性</th><th class="col-score">综合评分</th>';
    if (hasEps) { html += '<th class="col-eps">盈利预测（EPS）</th>'; }
    for (const d of dims) { html += `<th class="col-dim">${escapeHtml(d.name)}</th>`; }
    html += '<th class="col-note">备注</th></tr></thead><tbody>';

    for (const s of stocks) {
      const irr = s.irreplaceability || '';
      const irrTag = irr === '高' ? 'irreplaceable' : irr === '中' ? 'medium' : 'low-replace';
      const role = s.role || '';
      const roleTag = role === '领先者' ? 'irreplaceable' : role === '挑战者' ? 'medium' : role === '上游供应商' ? 'low-replace' : 'low-replace';
      html += '<tr>';
      html += `<td class="col-name"><strong>${escapeHtml(s.name)}</strong></td>`;
      html += `<td class="col-code">${escapeHtml(s.code||'')}</td>`;
      html += `<td class="col-role"><span class="tag ${roleTag}">${escapeHtml(role)}</span></td>`;
      html += `<td class="col-irr"><span class="tag ${irrTag}">${irr}</span></td>`;
      html += `<td class="col-score score-cell ${scoreColor(s.score)}">${s.score||'-'}</td>`;
      if (hasEps) {
        const ef = s.eps_forecast || {};
        if (ef.this_year && ef.next_year) {
          const growth = ef.growth_rate != null ? ef.growth_rate : ((ef.next_year - ef.this_year) / Math.abs(ef.this_year || 1) * 100);
          const gColor = growth >= 0 ? '#e74c3c' : '#27ae60';
          html += `<td class="col-eps"><span class="eps-line">${ef.this_year.toFixed(2)}→${ef.next_year.toFixed(2)}</span><br><span class="eps-growth" style="color:${gColor}">${growth>=0?'+':''}${growth.toFixed(1)}%</span></td>`;
        } else if (ef.next_year) {
          html += `<td class="col-eps"><span class="eps-line">—→${ef.next_year.toFixed(2)}</span></td>`;
        } else {
          html += '<td class="col-eps"><span style="color:#aaa">—</span></td>';
        }
      }
      if (s.score_detail) {
        for (const d of dims) {
          html += `<td class="col-dim score-cell ${scoreColor(s.score_detail[d.name]||0)}">${s.score_detail[d.name]||'-'}</td>`;
        }
      } else {
        for (const d of dims) { html += '<td class="col-dim">-</td>'; }
      }
      html += `<td class="col-note">${escapeHtml(s.note||'')}</td>`;
      html += '</tr>';
    }
    html += '</tbody></table></div></div>';
  }

  // Evidence sources
  const evidence = seg.evidence_sources || [];
  if (evidence.length) {
    const items = evidence.map(e => `
      <div class="evidence-item">
        <div class="evidence-title">${escapeHtml(e.source || '')}</div>
        <div class="evidence-meta">来源：${escapeHtml(e.institution || '研报数据库')} ${e.date ? '· ' + escapeHtml(e.date) : ''}</div>
      </div>
    `).join('');
    html += `<div class="card evidence-card">
      <div class="section-title">证据来源</div>
      <div class="evidence-list">${items}</div>
    </div>`;
  }

  return html;
}

buildTabs();
renderContent('overview');
