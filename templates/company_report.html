<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{COMPANY_NAME}} 深度分析</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6f8;color:#1a1a2e;line-height:1.7}
.container{max-width:900px;margin:0 auto;padding:24px}

/* ===== Header ===== */
.report-header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:44px 44px;border-radius:16px;margin-bottom:28px}
.report-header h1{font-size:30px;font-weight:700;margin-bottom:8px;line-height:1.3}
.report-header .subtitle{font-size:15px;color:#b0b8ce;font-weight:400;margin-top:6px;line-height:1.6}
.report-header .meta{font-size:13px;color:#8892b0;display:flex;gap:20px;flex-wrap:wrap;margin-top:18px}
.report-header .meta span{display:flex;align-items:center;gap:6px}
.report-header .meta .dot{width:6px;height:6px;border-radius:50%;background:#4a6fa5;flex-shrink:0}

/* ===== One sentence view ===== */
.view-card{background:#fff;border-radius:12px;padding:30px 32px;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:5px solid #0f3460}
.view-card .label{font-size:12px;font-weight:700;color:#0f3460;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;opacity:.8}
.view-card .text{font-size:18px;color:#1a1a2e;font-weight:600;line-height:1.75}

/* ===== Cards ===== */
.card{background:#fff;border-radius:12px;padding:30px 32px;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card h2{font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid #eef0f4;display:flex;align-items:center;gap:8px}
.card h2::before{content:"";width:4px;height:18px;background:#0f3460;border-radius:2px;flex-shrink:0}
.card h3{font-size:15px;font-weight:600;color:#333;margin:18px 0 8px}
.card p,.card li{font-size:14px;color:#444;line-height:1.8}
.card ul{padding-left:20px;margin:8px 0}

/* ===== Identity Grid ===== */
.identity-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:768px){.identity-grid{grid-template-columns:repeat(2,1fr)}}
.identity-item{padding:16px 12px;background:#f8f9fc;border-radius:10px;transition:background .2s}
.identity-item:hover{background:#f0f2f6}
.identity-item .label{font-size:11px;color:#999;margin-bottom:5px;letter-spacing:.2px}
.identity-item .value{font-size:16px;font-weight:700;color:#1a1a2e}

/* ===== Chain ===== */
.chain-flow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:16px 0;padding:20px;background:#f8f9fc;border-radius:10px}
.chain-box{flex:1;min-width:120px;background:#fff;border-radius:8px;padding:16px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04);border:1px solid #e8ecf1}
.chain-box.highlight{border-color:#0f3460;background:#f8faff}
.chain-box .title{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.chain-box .desc{font-size:12px;color:#666;line-height:1.5}
.chain-arrow{font-size:18px;color:#0f3460;font-weight:700;flex-shrink:0}

/* ===== Theme ===== */
.theme-tag{display:inline-block;background:#0f3460;color:#fff;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:14px;letter-spacing:.3px}
.theme-points li{margin-bottom:10px;font-size:14px;color:#444;line-height:1.75;position:relative;padding-left:4px}
.theme-points li::marker{color:#0f3460}

/* ===== Growth drivers ===== */
.driver-list{display:flex;flex-direction:column;gap:14px}
.driver-item{display:flex;gap:16px;padding:16px 18px;background:#f8f9fc;border-radius:10px;align-items:flex-start;transition:box-shadow .2s}
.driver-item:hover{box-shadow:0 2px 6px rgba(0,0,0,.06)}
.driver-impact{flex-shrink:0;min-width:48px;height:28px;padding:0 12px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;margin-top:6px}
.driver-impact.high{background:#e74c3c}
.driver-impact.mid{background:#f39c12}
.driver-impact.low{background:#7f8c8d}
.driver-content{flex:1}
.driver-title{font-weight:700;font-size:14px;color:#1a1a2e;margin-bottom:4px}
.driver-note{font-size:13px;color:#666;line-height:1.6}

/* ===== Business breakdown ===== */
.biz-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:768px){.biz-grid{grid-template-columns:1fr}}
.biz-card{border:1px solid #e8ecf1;border-radius:10px;padding:20px 18px;background:#fafbfc;transition:border-color .2s}
.biz-card:hover{border-color:#0f3460}
.biz-card .name{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:6px}
.biz-card .share{font-size:12px;color:#0f3460;font-weight:600;margin-bottom:8px;background:#eef2f9;display:inline-block;padding:2px 10px;border-radius:10px}
.biz-card .note{font-size:13px;color:#666;line-height:1.6}

/* ===== Comparison (merged) ===== */
.compare-position-bar{background:#f0f4f8;border-radius:8px;padding:14px 18px;margin-bottom:18px;border-left:4px solid #0f3460}
.compare-position-bar .pos-label{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.compare-position-bar .pos-text{font-size:14px;font-weight:600;color:#1a1a2e;line-height:1.6}
.compare-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:14px}
.compare-table th{background:#f8f9fc;padding:10px 14px;text-align:left;font-weight:600;color:#555;font-size:12px;border-bottom:2px solid #e8ecf1;white-space:nowrap}
.compare-table th:first-child{border-radius:6px 0 0 0}
.compare-table th:last-child{border-radius:0 6px 0 0}
.compare-table td{padding:12px 14px;border-bottom:1px solid #f0f1f5;color:#444;line-height:1.6;vertical-align:top}
.compare-table td.col-name{font-weight:700;color:#1a1a2e;min-width:80px;white-space:nowrap}
.compare-table tr:last-child td{border-bottom:none}
.compare-table td.col-vs{color:#0f3460;font-size:13px;min-width:150px}
.compare-table .tag-global{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#e8ecf1;color:#555;margin-right:4px}

/* ===== Profit Logic ===== */
.profit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:768px){.profit-grid{grid-template-columns:1fr}}
.profit-card{border:1px solid #e8ecf1;border-radius:10px;padding:18px 18px 18px 20px;background:#fff;position:relative;overflow:hidden}
.profit-card::before{content:"";position:absolute;top:0;left:0;bottom:0;width:3px;background:#0f3460}
.profit-card .profit-num{font-size:11px;font-weight:700;color:#0f3460;letter-spacing:1px;margin-bottom:6px;opacity:.7}
.profit-card .profit-title{font-size:14px;font-weight:700;color:#1a1a2e;line-height:1.6}

/* ===== Bottlenecks ===== */
.bottleneck-list{display:flex;flex-direction:column;gap:12px}
.bottleneck-item{display:flex;gap:14px;padding:14px 16px;background:#fff9f5;border-radius:10px;border-left:3px solid #e67e22;align-items:flex-start}
.bottleneck-title{flex-shrink:0;width:85px;font-size:13px;font-weight:700;color:#e67e22;margin-top:1px}
.bottleneck-text{flex:1;font-size:13px;color:#555;line-height:1.7}

/* ===== Evidence ===== */
.evidence-list{display:flex;flex-direction:column;gap:10px}
.evidence-item{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:#f8f9fc;border-radius:10px}
.evidence-level{flex-shrink:0;width:26px;height:26px;border-radius:50%;text-align:center;line-height:26px;font-size:11px;font-weight:700;color:#fff}
.evidence-level.A{background:#27ae60}
.evidence-level.B{background:#2980b9}
.evidence-level.C{background:#f39c12}
.evidence-content{flex:1;font-size:13px;color:#444;line-height:1.6}
.evidence-source{font-size:11px;color:#999;margin-top:4px}

/* ===== Metrics ===== */
.metrics-table{width:100%;border-collapse:collapse;font-size:13px}
.metrics-table th{background:#f8f9fc;padding:11px 14px;text-align:left;font-weight:600;color:#555;font-size:12px;border-bottom:2px solid #e8ecf1;white-space:nowrap}
.metrics-table td{padding:11px 14px;border-bottom:1px solid #f0f1f5;color:#444;line-height:1.6}
.metrics-table tr:last-child td{border-bottom:none}
.metrics-table .target{font-weight:700;color:#0f3460;white-space:nowrap}

/* ===== Risks ===== */
.risk-list{list-style:none;padding-left:0;display:flex;flex-direction:column;gap:10px}
.risk-list li{position:relative;padding:12px 0 12px 28px;border-bottom:1px solid #f2f3f5;font-size:13px;color:#555;line-height:1.7}
.risk-list li:last-child{border-bottom:none}
.risk-list li:before{content:"!";position:absolute;left:0;top:11px;width:18px;height:18px;background:#e74c3c;color:#fff;border-radius:50%;text-align:center;line-height:18px;font-size:11px;font-weight:700}

/* ===== Research path ===== */
.path-card{background:linear-gradient(135deg,#f0f4f8 0%,#e4eaf0 100%);border-radius:10px;padding:20px 22px;border-left:4px solid #0f3460}
.path-card .path-icon{font-size:20px;margin-bottom:8px}
.path-text{font-size:14px;color:#333;line-height:1.8}

/* ===== Footer ===== */
.report-footer{border-top:1px solid #e8ecf1;margin-top:36px;padding-top:20px;text-align:center}
.report-footer span{font-size:12px;color:#aaa;display:block;margin-bottom:4px}

/* ===== Two column ===== */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:768px){.two-col{grid-template-columns:1fr}}
.two-col .card{height:100%}

/* ===== Section spacing ===== */
.card h2 + p, .card h2 + ul, .card h2 + div{margin-top:0}

/* Small note */
.note-sm{font-size:12px;color:#999;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<div class="container">

<!-- Header -->
<div class="report-header">
  <h1 id="header_title">公司深度分析</h1>
  <div class="subtitle" id="header_subtitle">加载中...</div>
  <div class="meta">
    <span><span class="dot"></span><span id="meta_code">代码</span></span>
    <span><span class="dot"></span><span id="meta_industry">行业</span></span>
    <span><span class="dot"></span><span id="meta_date">报告日期</span></span>
  </div>
</div>

<!-- 一句话看懂 -->
<div class="view-card">
  <div class="label">一句话看懂</div>
  <div class="text" id="one_sentence_view">加载中...</div>
</div>

<!-- 公司身份 -->
<div class="card">
  <h2>公司身份</h2>
  <div class="identity-grid" id="identity_grid"></div>
  <p class="note-sm" id="main_business" style="margin-top:16px"></p>
</div>

<!-- 产业链定位 -->
<div class="card">
  <h2>把公司放到产业链中</h2>
  <p id="chain_text" style="font-size:14px;line-height:1.8;color:#444;margin-bottom:16px"></p>
  <div class="chain-flow" id="chain_flow"></div>
</div>

<!-- 核心概念关系 -->
<div class="card">
  <h2>它和核心概念的关系</h2>
  <div class="theme-tag" id="theme_tag"></div>
  <p id="theme_summary" style="font-size:14px;line-height:1.8;color:#444;margin-bottom:12px"></p>
  <ul class="theme-points" id="theme_points"></ul>
</div>

<!-- 增量驱动 -->
<div class="card">
  <h2>给公司带来的增量</h2>
  <div class="driver-list" id="driver_list"></div>
</div>

<!-- 业务拆分 -->
<div class="card">
  <h2>公司业务怎么拆</h2>
  <p id="biz_desc" style="font-size:14px;line-height:1.8;color:#444;margin-bottom:16px"></p>
  <div class="biz-grid" id="biz_grid"></div>
</div>

<!-- 竞争对比（全球+国内合并） -->
<div class="card" id="compare_card">
  <h2>和谁比较才合理</h2>
  <div class="compare-position-bar" id="compare_position_bar"></div>
  <div style="overflow-x:auto">
    <table class="compare-table">
      <thead><tr><th>对标公司</th><th>定位与实力</th><th id="compare_vs_header">差距与对标</th></tr></thead>
      <tbody id="compare_tbody"></tbody>
    </table>
  </div>
</div>

<!-- 盈利逻辑 -->
<div class="card">
  <h2>盈利逻辑</h2>
  <div class="profit-grid" id="profit_grid"></div>
</div>

<!-- 证据与卡点 -->
<div class="two-col">
  <div class="card">
    <h2>哪些证据能证明逻辑是真的</h2>
    <div class="evidence-list" id="evidence_list"></div>
  </div>
  <div class="card">
    <h2>真正的卡点</h2>
    <div class="bottleneck-list" id="bottleneck_list"></div>
  </div>
</div>

<!-- 关键跟踪指标 -->
<div class="card">
  <h2>关键跟踪指标</h2>
  <div style="overflow-x:auto">
    <table class="metrics-table" id="metrics_table">
      <thead><tr><th>指标</th><th>目标</th><th>为什么关注</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- 研究路径 -->
<div class="card">
  <h2>一句话研究路径</h2>
  <div class="path-card">
    <div class="path-text" id="research_path"></div>
  </div>
</div>

<!-- 风险 -->
<div class="card">
  <h2>风险与反证条件</h2>
  <ul class="risk-list" id="risk_list"></ul>
</div>

<!-- Footer -->
<div class="report-footer">
  <span>数据来源：同花顺问财 · 研报内容来自各券商研究所 · 仅供参考，不构成投资建议</span>
  <span style="margin-top:8px">生成时间：<span id="footer_time"></span></span>
</div>

</div>

<script>
var COMPANY_DATA = {{DATA_JSON}};

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

(function() {
  var d = COMPANY_DATA;
  var ci = d.company_identity || {};
  var now = new Date().toISOString().slice(0, 10);

  // Header
  document.title = (ci.name || d.company_name || '') + ' 深度分析';
  document.getElementById('header_title').textContent = (ci.name || d.company_name || '') + ' · 深度分析报告';
  document.getElementById('header_subtitle').textContent = ci.main_business || '';
  document.getElementById('meta_code').textContent = ci.code || d.code || '';
  document.getElementById('meta_industry').textContent = ci.industry || '';
  document.getElementById('meta_date').textContent = d.fetch_time || now;
  document.getElementById('footer_time').textContent = now;

  // 一句话看懂
  document.getElementById('one_sentence_view').textContent = d.one_sentence_view || '待补充';

  // 公司身份
  var idItems = [
    {label: '股票代码', value: ci.code || d.code || 'N/A'},
    {label: '所属行业', value: ci.industry || 'N/A'},
    {label: '总市值', value: ci.market_cap || 'N/A'},
    {label: '股价', value: ci.price ? ci.price.toFixed(2) : 'N/A'},
    {label: 'PE(TTM)', value: ci.pe_ttm ? ci.pe_ttm.toFixed(2) : 'N/A'},
    {label: 'PB', value: ci.pb ? ci.pb.toFixed(2) : 'N/A'}
  ];
  document.getElementById('identity_grid').innerHTML = idItems.map(function(it){
    return '<div class="identity-item"><div class="label">' + esc(it.label) + '</div><div class="value">' + esc(String(it.value)) + '</div></div>';
  }).join('');
  document.getElementById('main_business').textContent = ci.main_business || '待补充';

  // 产业链
  document.getElementById('chain_text').textContent = d.chain_positioning || '待补充';
  var flow = document.getElementById('chain_flow');
  if (d.chain_flow && d.chain_flow.length) {
    flow.innerHTML = d.chain_flow.map(function(box, i){
      var cls = box.highlight ? ' chain-box highlight' : 'chain-box';
      return '<div class="' + cls + '"><div class="title">' + esc(box.title) + '</div><div class="desc">' + esc(box.desc) + '</div></div>';
    }).join('<div class="chain-arrow">→</div>');
  } else {
    flow.innerHTML = '<div class="chain-box"><div class="title">待补充</div><div class="desc">请在 analysis.json 中填写 chain_flow 字段（上游 / 中游 / 下游结构）</div></div>';
  }

  // 核心概念关系
  var kt = d.key_theme_relation || {};
  document.getElementById('theme_tag').textContent = kt.theme || '核心逻辑';
  document.getElementById('theme_summary').textContent = kt.summary || '待补充';
  var pts = kt.points || [];
  document.getElementById('theme_points').innerHTML = pts.map(function(p){
    return '<li>' + esc(p) + '</li>';
  }).join('');

  // 增量驱动
  var drivers = d.growth_drivers || [];
  document.getElementById('driver_list').innerHTML = drivers.map(function(g){
    var impact = g.impact || '中';
    var cls = impact === '高' ? 'high' : impact === '低' ? 'low' : 'mid';
    return '<div class="driver-item"><div class="driver-impact ' + cls + '">' + esc(impact) + '</div><div class="driver-content"><div class="driver-title">' + esc(g.driver) + '</div><div class="driver-note">' + esc(g.note) + '</div></div></div>';
  }).join('');

  // 业务拆分
  var bb = d.business_breakdown || {};
  document.getElementById('biz_desc').textContent = bb.description || '待补充';
  var segs = bb.segments || [];
  document.getElementById('biz_grid').innerHTML = segs.map(function(s){
    return '<div class="biz-card"><div class="name">' + esc(s.name) + '</div><div class="share">' + esc(s.share) + '</div><div class="note">' + esc(s.note) + '</div></div>';
  }).join('');

  // 竞争对比（合并）
  var cc = d.competitive_comparison || {};
  var compPos = cc.china_position || cc.global || '';
  var compName = (d.company_name || d.code || '该公司');
  document.getElementById('compare_position_bar').innerHTML = '<div class="pos-label">' + esc(compName) + '的位置</div><div class="pos-text">' + esc(cc.position_summary || '待补充') + '</div>';
  document.getElementById('compare_vs_header').textContent = '与' + compName + '的差距';

  var compRows = [];
  // Global competitors
  if (cc.global_companies) {
    cc.global_companies.forEach(function(g){
      compRows.push({name: g.name, tag: '全球', position: g.position, vs: g.vs || ''});
    });
  } else if (cc.global) {
    compRows.push({name: '英飞凌', tag: '全球', position: '全球 IGBT 和 SiC 龙头，车规级产品全覆盖', vs: compName + '在高端 IGBT/SiC 技术和规模上有代差'});
    compRows.push({name: '安森美 / 意法半导体', tag: '全球', position: '中高压功率器件主要供应商', vs: compName + '主攻中低压市场，正面竞争有限'});
  }
  // China competitors
  var china = cc.china || [];
  china.forEach(function(c){
    compRows.push({name: c.name, tag: '国内', position: c.position, vs: c.vs || ''});
  });
  document.getElementById('compare_tbody').innerHTML = compRows.map(function(r){
    return '<tr><td class="col-name"><span class="tag-global">' + esc(r.tag) + '</span>' + esc(r.name) + '</td><td>' + esc(r.position) + '</td><td class="col-vs">' + esc(r.vs) + '</td></tr>';
  }).join('');

  // 盈利逻辑（卡片式）
  var pl = d.profit_logic || [];
  document.getElementById('profit_grid').innerHTML = pl.map(function(p, i){
    return '<div class="profit-card"><div class="profit-num">NO.0' + (i+1) + '</div><div class="profit-title">' + esc(p) + '</div></div>';
  }).join('');

  // 证据
  var ev = d.evidence_sources || [];
  document.getElementById('evidence_list').innerHTML = ev.map(function(e){
    var lvl = e.level || 'C';
    return '<div class="evidence-item"><div class="evidence-level ' + lvl + '">' + esc(lvl) + '</div><div class="evidence-content">' + esc(e.content) + '<div class="evidence-source">' + esc(e.source) + '</div></div></div>';
  }).join('');

  // 卡点
  var bn = d.real_bottlenecks || [];
  document.getElementById('bottleneck_list').innerHTML = bn.map(function(b){
    return '<div class="bottleneck-item"><div class="bottleneck-title">' + esc(b.bottleneck) + '</div><div class="bottleneck-text">' + esc(b.detail) + '</div></div>';
  }).join('');

  // 关键指标
  var mt = document.getElementById('metrics_table').querySelector('tbody');
  var metrics = d.key_metrics || [];
  mt.innerHTML = metrics.map(function(m){
    return '<tr><td>' + esc(m.metric) + '</td><td class="target">' + esc(m.target) + '</td><td>' + esc(m.why) + '</td></tr>';
  }).join('');

  // 研究路径
  document.getElementById('research_path').textContent = d.research_path || '待补充';

  // 风险
  var rl = d.risks || [];
  document.getElementById('risk_list').innerHTML = rl.map(function(r){
    return '<li>' + esc(r) + '</li>';
  }).join('');
})();
</script>
</body>
</html>
